<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>

  /* ============================================================
     EDIT DI SINI: ganti nama, kata-kata, foto, dan lagu kamu
     ============================================================ */

  :root{
    --bg-deep: #0c0910;
    --bg-plum: #1a1220;
    --gold: #d4af37;
    --gold-soft: #f4d793;
    --cream: #f3e6d0;
    --rose: #e8b4a8;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0; padding:0;
    background: radial-gradient(ellipse at 50% 0%, var(--bg-plum) 0%, var(--bg-deep) 65%);
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    overflow-x: hidden;
    min-height: 100%;
  }

  /* ---------- ambient gold particles ---------- */
  #sparks{
    position: fixed; inset:0; pointer-events:none; z-index:0;
  }
  .spark{
    position:absolute; border-radius:50%;
    background: var(--gold-soft);
    opacity:0; filter: blur(0.3px);
    animation: rise linear infinite;
  }
  @keyframes rise{
    0%{ opacity:0; transform: translateY(0) scale(0.6); }
    10%{ opacity:0.9; }
    90%{ opacity:0.5; }
    100%{ opacity:0; transform: translateY(-110vh) scale(1); }
  }

  section{
    position: relative; z-index:1;
    min-height:100vh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding: 60px 24px;
  }

  /* ---------- HERO / ENVELOPE ---------- */
  #hero .eyebrow{
    letter-spacing: 0.35em; text-transform:uppercase;
    font-size: 11px; color: var(--gold); opacity:0.8;
    margin-bottom: 18px;
  }

  .envelope-wrap{ cursor:pointer; user-select:none; text-align:center; }

  .envelope{
    position:relative; width: 260px; height: 170px;
    margin: 0 auto;
  }
  .env-body{
    position:absolute; inset:0;
    background: linear-gradient(180deg,#2a1f2e,#1a1220);
    border: 1px solid rgba(212,175,55,0.4);
    border-radius: 4px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55);
  }
  .env-flap{
    position:absolute; top:0; left:0; width:100%; height:100%;
    background: linear-gradient(135deg,#3a2a3e,#241a2a);
    clip-path: polygon(0 0, 100% 0, 50% 58%);
    transform-origin: top center;
    transition: transform 0.9s cubic-bezier(.6,.1,.25,1);
    border-bottom: 1px solid rgba(212,175,55,0.25);
    z-index:3;
  }
  .seal{
    position:absolute; top: 40%; left:50%;
    width:46px; height:46px; margin:-23px 0 0 -23px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #e6c14d, #a97e1f 70%, #7a5a15);
    box-shadow: 0 3px 10px rgba(0,0,0,0.5);
    display:flex; align-items:center; justify-content:center;
    font-family:'Cormorant Garamond', serif; font-style:italic; font-size:18px;
    color:#3a2a10; z-index:4;
    transition: transform 0.5s ease, opacity 0.5s ease;
  }
  .envelope.open .env-flap{ transform: rotateX(180deg); }
  .envelope.open .seal{ transform: scale(0) rotate(25deg); opacity:0; }

  .letter{
    position:absolute; left: 8%; width:84%; top: 14px;
    height: 0; background: #f6ecd9; border-radius: 2px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    overflow:hidden; z-index:2;
    transition: height 1s cubic-bezier(.2,.8,.2,1) 0.35s, transform 1s cubic-bezier(.2,.8,.2,1) 0.35s;
    transform: translateY(0);
  }
  .envelope.open .letter{ height: 340px; transform: translateY(-190px); }

  .hint{ margin-top: 26px; font-size: 13px; letter-spacing:0.08em; color: rgba(243,230,208,0.55); }

  /* ---------- LETTER TEXT (revealed) ---------- */
  #letter-page{
    display:none; text-align:center; max-width: 620px;
  }
  #letter-page.show{ display:flex; flex-direction:column; align-items:center; }

  .from-line{ font-size:13px; letter-spacing:0.3em; text-transform:uppercase; color: var(--gold); margin-bottom: 22px; }

  .name-display{
    font-family:'Cormorant Garamond', serif; font-style:italic;
    font-size: clamp(32px, 6vw, 54px); color: var(--gold-soft);
    margin: 0 0 30px;
  }

  .poem{
    font-family:'Cormorant Garamond', serif; font-size: clamp(20px, 3vw, 27px);
    line-height:1.9; color: var(--cream); min-height: 260px;
    white-space: pre-wrap;
  }
  .cursor{ display:inline-block; width:2px; background:var(--gold-soft); margin-left:2px; animation: blink 0.9s steps(1) infinite; }
  @keyframes blink{ 50%{ opacity:0; } }

  .signature{
    margin-top: 34px; font-family:'Cormorant Garamond', serif; font-style:italic;
    font-size: 24px; color: var(--gold); opacity:0; transition: opacity 1s ease;
  }
  .signature.show{ opacity:1; }

  .scroll-cue{ margin-top:50px; opacity:0; transition: opacity 1s ease; font-size:12px; letter-spacing:0.25em; color: rgba(243,230,208,0.5); }
  .scroll-cue.show{ opacity:1; }
  .scroll-cue span{ display:block; margin-top:8px; animation: bob 2s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(6px);} }

  /* ---------- GALLERY ---------- */
  #gallery h2{
    font-family:'Cormorant Garamond', serif; font-weight:600; font-style:italic;
    font-size: clamp(26px, 4vw, 38px); color: var(--gold-soft); margin-bottom: 50px; text-align:center;
  }
  .polaroids{
    display:flex; flex-wrap:wrap; gap: 34px; justify-content:center; max-width: 900px;
  }
  .polaroid{
    background:#f3ede2; padding: 14px 14px 46px; border-radius:2px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    width: 210px;
    transition: transform 0.35s ease;
  }
  .polaroid:nth-child(odd){ transform: rotate(-4deg); }
  .polaroid:nth-child(even){ transform: rotate(3deg); }
  .polaroid:hover{ transform: scale(1.06) rotate(0deg); z-index:5; }
  .polaroid .frame{
    width:100%; aspect-ratio: 1/1; background: linear-gradient(135deg,#2a1f2e,#453056);
    display:flex; align-items:center; justify-content:center;
    color: rgba(243,230,208,0.4); font-size:12px; text-align:center; padding:10px;
    font-family:'Jost',sans-serif;
  }
  .polaroid .cap{
    font-family:'Cormorant Garamond', serif; font-style:italic; color:#3a2a30;
    text-align:center; margin-top:10px; font-size:15px;
  }

  /* ---------- MUSIC PLAYER ---------- */
  #player{
    position:fixed; bottom:20px; right:20px; z-index:10;
    display:flex; align-items:center; gap:10px;
    background: rgba(26,18,32,0.85); backdrop-filter: blur(6px);
    border: 1px solid rgba(212,175,55,0.35);
    padding: 10px 16px; border-radius: 999px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  #playBtn{
    width:34px; height:34px; border-radius:50%; border:1px solid var(--gold);
    background: transparent; color: var(--gold-soft); cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:14px;
  }
  #player span{ font-size:11px; letter-spacing:0.05em; color: rgba(243,230,208,0.7); }

  footer{
    text-align:center; padding: 40px 20px 60px; font-size:11px;
    letter-spacing:0.2em; color: rgba(243,230,208,0.35); position:relative; z-index:1;
  }
</style>
</head>
<body>

<div id="sparks"></div>

<!-- ================= HERO: ENVELOPE ================= -->
<section id="hero">
  <div class="eyebrow">Sebuah kejutan kecil</div>
  <div class="envelope-wrap" id="envelopeWrap">
    <div class="envelope" id="envelope">
      <div class="letter"></div>
      <div class="env-body"></div>
      <div class="env-flap"></div>
      <div class="seal">&hearts;</div>
    </div>
    <div class="hint">ketuk amplopnya</div>
  </div>
</section>

<!-- ================= LETTER REVEAL ================= -->
<section id="letter-page">
  <div class="from-line">Untuk</div>
  <!-- GANTI nama pacarmu di sini -->
  <div class="name-display">Chuaya</div>

  <!-- GANTI isi surat/puisi di sini. Baris baru pakai \n di dalam JS di bawah -->
  <div class="poem" id="poemText"></div>

  <!-- GANTI nama kamu di sini -->
  <div class="signature" id="sigLine">— dari, Bilal</div>

  <div class="scroll-cue" id="scrollCue">gulir ke bawah<span>&#8595;</span></div>
</section>

<!-- ================= GALLERY ================= -->
<section id="gallery">
  <h2>Untukmu, Selalu Cantik</h2>
  <div class="polaroids">
    <!-- Foto 1: taruh file "foto1.jpg" di folder yang sama dengan index.html -->
    <div class="polaroid"><div class="frame"><img src="foto1.jpg" style="width:100%;height:100%;object-fit:cover" alt="foto 1"></div><div class="cap">cantiknya kamu</div></div>
    <!-- Foto 2: taruh file "foto2.jpg" di folder yang sama dengan index.html -->
    <div class="polaroid"><div class="frame"><img src="foto2.jpg" style="width:100%;height:100%;object-fit:cover" alt="foto 2"></div><div class="cap">favoritku</div></div>
  </div>
</section>

<footer>dibuat dengan &hearts;</footer>

<!-- ================= MUSIC PLAYER ================= -->
<div id="player">
  <button id="playBtn">&#9658;</button>
  <span>lagu kita</span>
  <!-- GANTI src dengan file mp3 kamu, taruh di folder yang sama dengan file ini -->
  <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
</div>

<script>
  // ============================================================
  // EDIT DI SINI: isi surat/puisinya, ganti bebas sesuai isi hati kamu
  // ============================================================
  const poemLines = `Setiap hari yang kulewati bersamamu terasa seperti halaman baru
dari cerita paling indah yang pernah kutulis.

Kamu adalah alasan aku tersenyum di waktu yang paling sederhana,
dan tempat paling hangat yang pernah kutemukan.

Terima kasih sudah menjadi kamu,
dan terima kasih sudah memilih untuk tetap di sini, bersamaku.`;

  // ---------- ambient sparks ----------
  const sparkContainer = document.getElementById('sparks');
  for(let i=0;i<28;i++){
    const s = document.createElement('div');
    s.className='spark';
    const size = 2 + Math.random()*3;
    s.style.width = size+'px';
    s.style.height = size+'px';
    s.style.left = Math.random()*100+'vw';
    s.style.top = (60+Math.random()*40)+'vh';
    s.style.animationDuration = (8+Math.random()*10)+'s';
    s.style.animationDelay = (Math.random()*10)+'s';
    sparkContainer.appendChild(s);
  }

  // ---------- envelope open + typewriter ----------
  const envelope = document.getElementById('envelope');
  const envelopeWrap = document.getElementById('envelopeWrap');
  const letterPage = document.getElementById('letter-page');
  const poemText = document.getElementById('poemText');
  const sigLine = document.getElementById('sigLine');
  const scrollCue = document.getElementById('scrollCue');
  let opened = false;

  envelopeWrap.addEventListener('click', () => {
    if(opened) return;
    opened = true;
    envelope.classList.add('open');
    setTimeout(() => {
      letterPage.classList.add('show');
      window.scrollTo({top: window.innerHeight, behavior:'smooth'});
      typeWriter();
    }, 900);
  });

  function typeWriter(){
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className='cursor';
    cursor.textContent='\u00A0';
    poemText.appendChild(cursor);
    function step(){
      if(i < poemLines.length){
        cursor.insertAdjacentText('beforebegin', poemLines[i]);
        i++;
        setTimeout(step, 18);
      } else {
        cursor.remove();
        sigLine.classList.add('show');
        scrollCue.classList.add('show');
      }
    }
    step();
  }

  // ---------- music toggle ----------
  const playBtn = document.getElementById('playBtn');
  const bgMusic = document.getElementById('bgMusic');
  let playing = false;
  playBtn.addEventListener('click', () => {
    if(!playing){
      bgMusic.play().catch(()=>{});
      playBtn.innerHTML = '&#10074;&#10074;';
    } else {
      bgMusic.pause();
      playBtn.innerHTML = '&#9658;';
    }
    playing = !playing;
  });
</script>

</body>
</html>
