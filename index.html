<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Untuk Kamu • Love Letter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 30% 10%, #1a1220, #0c0910);
      min-height: 100vh;
      font-family: 'Jost', sans-serif;
      color: #f0e9e1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      overflow-x: hidden;
      position: relative;
    }

    /* ===== GLOW ORBES ===== */
    .glow-orbe {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .glow-orbe.g1 {
      width: 500px;
      height: 500px;
      background: #ff3b7f22;
      top: -100px;
      left: -100px;
    }
    .glow-orbe.g2 {
      width: 400px;
      height: 400px;
      background: #7f3bff22;
      bottom: -80px;
      right: -80px;
    }
    .glow-orbe.g3 {
      width: 300px;
      height: 300px;
      background: #ff7b3b1a;
      top: 40%;
      left: 50%;
      transform: translateX(-50%);
    }

    /* ===== FLOATING LOVE LETTERS (GETAR) ===== */
    .love-float {
      position: fixed;
      font-size: 1.6rem;
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
      animation: floatLove 16s infinite alternate ease-in-out, shake 0.8s infinite alternate;
      user-select: none;
    }

    @keyframes floatLove {
      0% { transform: translateY(0px) rotate(0deg) scale(0.9); }
      100% { transform: translateY(-120px) rotate(20deg) scale(1.2); }
    }

    @keyframes shake {
      0% { transform: translateX(-3px) rotate(-2deg); }
      100% { transform: translateX(3px) rotate(2deg); }
    }

    /* Variasi delay biar gak serempak */
    .love-float:nth-child(1) { animation-delay: 0s, 0.1s; font-size: 1.8rem; }
    .love-float:nth-child(2) { animation-delay: 1.5s, 0.4s; font-size: 2.2rem; }
    .love-float:nth-child(3) { animation-delay: 3s, 0.7s; font-size: 1.4rem; }
    .love-float:nth-child(4) { animation-delay: 0.8s, 0.2s; font-size: 2rem; }
    .love-float:nth-child(5) { animation-delay: 2.2s, 0.5s; font-size: 1.5rem; }
    .love-float:nth-child(6) { animation-delay: 4s, 0.9s; font-size: 1.9rem; }
    .love-float:nth-child(7) { animation-delay: 1.2s, 0.3s; font-size: 1.3rem; }
    .love-float:nth-child(8) { animation-delay: 3.5s, 0.6s; font-size: 2.1rem; }
    .love-float:nth-child(9) { animation-delay: 0.5s, 0.15s; font-size: 1.7rem; }
    .love-float:nth-child(10) { animation-delay: 2.8s, 0.8s; font-size: 1.5rem; }
    .love-float:nth-child(11) { animation-delay: 1.8s, 0.45s; font-size: 2rem; }
    .love-float:nth-child(12) { animation-delay: 4.2s, 0.95s; font-size: 1.6rem; }

    /* ===== MAIN CARD ===== */
    .card {
      position: relative;
      z-index: 2;
      max-width: 700px;
      width: 100%;
      background: rgba(15, 12, 30, 0.6);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 75, 130, 0.2);
      border-radius: 48px;
      padding: 3.2rem 2.5rem 3rem;
      box-shadow: 0 30px 70px rgba(255, 30, 100, 0.15), 0 0 0 1px rgba(255, 75, 130, 0.05) inset;
      text-align: center;
      transition: 0.4s ease;
    }

    .card:hover {
      border-color: rgba(255, 75, 130, 0.4);
      box-shadow: 0 40px 90px rgba(255, 30, 100, 0.25);
    }

    /* ===== GLOW LINE ===== */
    .glow-line {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff4d8f, #a855f7, transparent);
      margin: 0 auto 1.5rem;
      border-radius: 10px;
      filter: drop-shadow(0 0 8px #ff4d8f55);
    }

    /* ===== HEADLINE ===== */
    .sub {
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #a78bbf;
      margin-bottom: 0.5rem;
      font-weight: 300;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(3rem, 10vw, 5.2rem);
      font-weight: 600;
      background: linear-gradient(135deg, #f9d4e0, #ff7eb3, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.25rem;
      filter: drop-shadow(0 0 30px #ff3b7f33);
    }

    .heart-icon {
      display: inline-block;
      font-size: 1.6rem;
      color: #ff4d8f;
      animation: pulseHeart 1.8s infinite;
      filter: drop-shadow(0 0 20px #ff3b7f55);
      margin: 0 0.2rem;
    }
    @keyframes pulseHeart {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* ===== ENVELOPE BUTTON ===== */
    .envelope-btn {
      display: inline-block;
      margin: 1.8rem auto 0.5rem;
      padding: 0.8rem 2.8rem;
      background: linear-gradient(135deg, #ff4d8f, #a855f7);
      border: none;
      border-radius: 60px;
      color: #fff;
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 0 30px #ff3b7f44;
      position: relative;
      overflow: hidden;
    }

    .envelope-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 50px #ff3b7f66;
    }

    .envelope-btn:active {
      transform: scale(0.95);
    }

    .envelope-btn .btn-text {
      position: relative;
      z-index: 2;
    }

    .envelope-btn .btn-glow {
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 60%);
      animation: btnGlow 3s infinite linear;
      pointer-events: none;
    }
    @keyframes btnGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ===== SURAT ===== */
    .letter-body {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 2.5vw, 1.55rem);
      line-height: 2;
      color: #e7dcef;
      margin: 1.8rem 0 1.5rem;
      padding: 0 0.5rem;
      white-space: pre-wrap;
      text-align: left;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .letter-body.show {
      opacity: 1;
      transform: translateY(0);
    }

    .letter-body .cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: #ff7eb3;
      margin-left: 3px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ===== SIGNATURE ===== */
    .signature {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.6rem;
      color: #cfa7f0;
      margin-top: 0.5rem;
      opacity: 0;
      transition: opacity 1.2s ease;
      letter-spacing: 0.05em;
      text-align: right;
      padding-right: 0.5rem;
    }
    .signature.show {
      opacity: 1;
    }

    .signature .heart-small {
      color: #ff4d8f;
      font-size: 1.2rem;
      display: inline-block;
      animation: pulseHeart 1.5s infinite;
    }

    /* ===== GALLERY ===== */
    .gallery-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      margin: 3.5rem 0 1.8rem;
      color: #f0d6e8;
      text-shadow: 0 0 30px #ff3b7f22;
    }

    .polaroids {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      margin-top: 0.5rem;
    }

    .polaroid {
      background: #171026;
      padding: 0.8rem 0.8rem 2.2rem;
      border-radius: 18px;
      border: 1px solid rgba(255, 75, 130, 0.2);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      width: 180px;
      transition: 0.4s ease;
      transform: rotate(var(--rot, 0deg));
    }
    .polaroid:nth-child(1) { --rot: -3deg; }
    .polaroid:nth-child(2) { --rot: 4deg; }

    .polaroid:hover {
      transform: scale(1.05) rotate(0deg) translateY(-6px);
      border-color: #ff7eb3;
      box-shadow: 0 0 50px #ff3b7f33;
    }

    .polaroid .frame {
      width: 100%;
      aspect-ratio: 1/1;
      background: #0b0818;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .polaroid .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .polaroid .cap {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      text-align: center;
      margin-top: 0.7rem;
      font-size: 0.9rem;
      color: #c9b3d9;
      letter-spacing: 0.05em;
    }

    /* ===== FOOTER ===== */
    .footer {
      margin-top: 3.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: #4d3b5e;
      z-index: 2;
      position: relative;
    }
    .footer span {
      color: #ff4d8f;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 500px) {
      .card { padding: 2rem 1.2rem; }
      .polaroid { width: 140px; }
      .envelope-btn { padding: 0.7rem 2rem; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <!-- GLOW ORBES -->
  <div class="glow-orbe g1"></div>
  <div class="glow-orbe g2"></div>
  <div class="glow-orbe g3"></div>

  <!-- ===== FLOATING LOVE LETTERS (GETAR) ===== -->
  <div class="love-float" style="top:5%; left:3%;">💌</div>
  <div class="love-float" style="top:15%; right:2%;">💌</div>
  <div class="love-float" style="bottom:10%; left:5%;">💌</div>
  <div class="love-float" style="bottom:20%; right:3%;">💌</div>
  <div class="love-float" style="top:35%; left:1%;">💌</div>
  <div class="love-float" style="top:50%; right:1%;">💌</div>
  <div class="love-float" style="top:70%; left:4%;">💌</div>
  <div class="love-float" style="top:80%; right:5%;">💌</div>
  <div class="love-float" style="top:25%; left:6%;">💌</div>
  <div class="love-float" style="top:60%; right:6%;">💌</div>
  <div class="love-float" style="top:90%; left:7%;">💌</div>
  <div class="love-float" style="top:45%; right:8%;">💌</div>

  <!-- ===== MAIN CARD ===== -->
  <div class="card">

    <div class="sub">✦ Untuk Kamu ✦</div>

    <div class="name">
      <span class="heart-icon">♥</span> Chuaya <span class="heart-icon">♥</span>
    </div>

    <div class="glow-line"></div>

    <!-- TOMBOL BUKA SURAT -->
    <button class="envelope-btn" id="openLetterBtn">
      <span class="btn-glow"></span>
      <span class="btn-text">💌 Buka Suratnya</span>
    </button>

    <!-- SURAT (awalnya tersembunyi) -->
    <div class="letter-body" id="poemText"></div>

    <div class="signature" id="sigLine">— dengan cinta, <span class="heart-small">♥</span> Bilal</div>

  </div>

  <!-- ===== GALLERY ===== -->
  <div class="gallery-title">✦ untukmu, selalu cantik ✦</div>

  <div class="polaroids">
    <div class="polaroid">
      <div class="frame"><img src="foto1.jpg" alt="foto 1" /></div>
      <div class="cap">♥ senyummu</div>
    </div>
    <div class="polaroid">
      <div class="frame"><img src="foto2.jpg" alt="foto 2" /></div>
      <div class="cap">♥ favoritku</div>
    </div>
  </div>

  <div class="footer">dibuat dengan <span>♥</span></div>

  <script>
    // =========================================
    // ISI SURAT — Ganti sesuai keinginan kamu
    // =========================================
    const poemLines = `Setiap hari yang kulewati bersamamu terasa seperti halaman baru
dari cerita paling indah yang pernah kutulis.

Kamu adalah alasan aku tersenyum di waktu yang paling sederhana,
dan tempat paling hangat yang pernah kutemukan.

Terima kasih sudah menjadi kamu,
dan terima kasih sudah memilih untuk tetap di sini, bersamaku.`;

    // ===== ELEMEN =====
    const poemText = document.getElementById('poemText');
    const sigLine = document.getElementById('sigLine');
    const openBtn = document.getElementById('openLetterBtn');
    let isOpen = false;

    // ===== TYPEWRITER =====
    function typeWriter() {
      let i = 0;
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      cursor.textContent = '\u00A0';
      poemText.appendChild(cursor);

      function step() {
        if (i < poemLines.length) {
          cursor.insertAdjacentText('beforebegin', poemLines[i]);
          i++;
          setTimeout(step, 20);
        } else {
          cursor.remove();
          sigLine.classList.add('show');
        }
      }
      step();
    }

    // ===== TOMBOL BUKA SURAT =====
    openBtn.addEventListener('click', () => {
      if (isOpen) return;
      isOpen = true;

      // Ubah tombol
      openBtn.innerHTML = `
        <span class="btn-glow"></span>
        <span class="btn-text">💖 Terbuka Untukmu</span>
      `;
      openBtn.style.opacity = '0.7';
      openBtn.style.cursor = 'default';

      // Tampilkan surat dengan animasi
      poemText.classList.add('show');

      // Mulai ngetik setelah surat muncul
      setTimeout(() => {
        typeWriter();
      }, 500);

      // Scroll sedikit ke bawah biar surat keliatan
      setTimeout(() => {
        window.scrollTo({
          top: window.scrollY + 100,
          behavior: 'smooth'
        });
      }, 300);
    });

    // ===== AUTO TRIGGER SAAT LOAD (opsional) =====
    // Hapus komen di bawah kalo mau langsung kebuka otomatis
    // setTimeout(() => { openBtn.click(); }, 800);
  </script>

</body>
</html>
