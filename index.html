<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Untuk Kamu • Cyber Love</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 30% 10%, #0f0c1a, #05030b);
      min-height: 100vh;
      font-family: 'Jost', sans-serif;
      color: #f0e9e1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      overflow-x: hidden;
      position: relative;
    }

    /* ===== CYBER GLOW ===== */
    .glow-orbe {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .glow-orbe.g1 {
      width: 500px;
      height: 500px;
      background: #ff3b7f33;
      top: -100px;
      left: -100px;
    }
    .glow-orbe.g2 {
      width: 400px;
      height: 400px;
      background: #7f3bff33;
      bottom: -80px;
      right: -80px;
    }
    .glow-orbe.g3 {
      width: 300px;
      height: 300px;
      background: #ff7b3b22;
      top: 40%;
      left: 50%;
      transform: translateX(-50%);
    }

    /* ===== FLOATING HEARTS ===== */
    .heart-float {
      position: fixed;
      color: #ff4d8f;
      font-size: 1.4rem;
      opacity: 0.2;
      pointer-events: none;
      z-index: 0;
      animation: floatHeart 12s infinite alternate ease-in-out;
    }
    @keyframes floatHeart {
      0% { transform: translateY(0px) scale(0.8) rotate(0deg); opacity: 0.15; }
      100% { transform: translateY(-80px) scale(1.2) rotate(15deg); opacity: 0.4; }
    }

    /* ===== MAIN CARD ===== */
    .card {
      position: relative;
      z-index: 2;
      max-width: 700px;
      width: 100%;
      background: rgba(15, 12, 30, 0.55);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 75, 130, 0.3);
      border-radius: 48px;
      padding: 3.2rem 2.5rem 3rem;
      box-shadow: 0 30px 70px rgba(255, 30, 100, 0.2), 0 0 0 1px rgba(255, 75, 130, 0.1) inset;
      text-align: center;
      transition: 0.3s ease;
    }

    .card:hover {
      border-color: rgba(255, 75, 130, 0.6);
      box-shadow: 0 40px 90px rgba(255, 30, 100, 0.35);
    }

    /* ===== GLOW LINE ===== */
    .glow-line {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff4d8f, #a855f7, transparent);
      margin: 0 auto 1.5rem;
      border-radius: 10px;
      filter: drop-shadow(0 0 8px #ff4d8f77);
    }

    /* ===== HEADLINE ===== */
    .sub {
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #a78bbf;
      margin-bottom: 0.5rem;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(3rem, 10vw, 5.2rem);
      font-weight: 600;
      background: linear-gradient(135deg, #f9d4e0, #ff7eb3, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.25rem;
      filter: drop-shadow(0 0 30px #ff3b7f44);
    }

    .heart-icon {
      display: inline-block;
      font-size: 1.8rem;
      color: #ff4d8f;
      animation: pulseHeart 1.8s infinite;
      filter: drop-shadow(0 0 20px #ff3b7f66);
      margin: 0 0.3rem;
    }
    @keyframes pulseHeart {
      0% { transform: scale(1); }
      50% { transform: scale(1.25); }
      100% { transform: scale(1); }
    }

    /* ===== SURAT ===== */
    .letter-body {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 2.5vw, 1.55rem);
      line-height: 1.9;
      color: #e7dcef;
      margin: 2rem 0 1.8rem;
      padding: 0 0.5rem;
      white-space: pre-wrap;
      text-align: left;
    }

    .letter-body .cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: #ff7eb3;
      margin-left: 3px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ===== SIGNATURE ===== */
    .signature {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.5rem;
      color: #cfa7f0;
      margin-top: 0.5rem;
      opacity: 0;
      transition: opacity 1.2s ease;
      letter-spacing: 0.05em;
    }
    .signature.show {
      opacity: 1;
    }

    /* ===== GALLERY ===== */
    .gallery-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      margin: 3rem 0 1.8rem;
      color: #f0d6e8;
      text-shadow: 0 0 30px #ff3b7f33;
    }

    .polaroids {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      margin-top: 0.5rem;
    }

    .polaroid {
      background: #171026;
      padding: 0.8rem 0.8rem 2.2rem;
      border-radius: 18px;
      border: 1px solid rgba(255, 75, 130, 0.25);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      width: 180px;
      transition: 0.3s ease;
      transform: rotate(var(--rot, 0deg));
    }
    .polaroid:nth-child(1) { --rot: -3deg; }
    .polaroid:nth-child(2) { --rot: 4deg; }

    .polaroid:hover {
      transform: scale(1.05) rotate(0deg) translateY(-6px);
      border-color: #ff7eb3;
      box-shadow: 0 0 50px #ff3b7f44;
    }

    .polaroid .frame {
      width: 100%;
      aspect-ratio: 1/1;
      background: #0b0818;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .polaroid .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .polaroid .cap {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      text-align: center;
      margin-top: 0.7rem;
      font-size: 0.9rem;
      color: #c9b3d9;
      letter-spacing: 0.05em;
    }

    /* ===== FOOTER ===== */
    .footer {
      margin-top: 3.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: #4d3b5e;
      z-index: 2;
      position: relative;
    }
    .footer span {
      color: #ff4d8f;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 500px) {
      .card { padding: 2rem 1.2rem; }
      .polaroid { width: 140px; }
    }

    /* hilangkan scroll cue dari section sebelumnya */
    .scroll-cue { display: none; }
  </style>
</head>
<body>

  <!-- GLOW ORBES -->
  <div class="glow-orbe g1"></div>
  <div class="glow-orbe g2"></div>
  <div class="glow-orbe g3"></div>

  <!-- FLOATING HEARTS -->
  <div class="heart-float" style="top:8%; left:5%;">♥</div>
  <div class="heart-float" style="top:20%; right:3%; animation-delay:2s; font-size:2rem;">♥</div>
  <div class="heart-float" style="bottom:12%; left:8%; animation-delay:4s;">♥</div>
  <div class="heart-float" style="bottom:25%; right:6%; animation-delay:1s; font-size:1.8rem;">♥</div>
  <div class="heart-float" style="top:45%; left:2%; animation-delay:3s; font-size:1.2rem;">♥</div>
  <div class="heart-float" style="top:55%; right:2%; animation-delay:5s;">♥</div>

  <!-- ===== MAIN CARD ===== -->
  <div class="card">

    <div class="sub">✦ Untuk Kamu ✦</div>

    <div class="name">
      <span class="heart-icon">♥</span> Chuaya <span class="heart-icon">♥</span>
    </div>

    <div class="glow-line"></div>

    <!-- SURAT -->
    <div class="letter-body" id="poemText"></div>

    <div class="signature" id="sigLine">— dari, Bilal</div>

  </div>

  <!-- ===== GALLERY ===== -->
  <div class="gallery-title">✦ untukmu, selalu cantik ✦</div>

  <div class="polaroids">
    <div class="polaroid">
      <div class="frame"><img src="foto1.jpg" alt="foto 1" /></div>
      <div class="cap">♥ senyummu</div>
    </div>
    <div class="polaroid">
      <div class="frame"><img src="foto2.jpg" alt="foto 2" /></div>
      <div class="cap">♥ favoritku</div>
    </div>
  </div>

  <div class="footer">dibuat dengan <span>♥</span> • cyber love</div>

  <script>
    // =========================================
    // ISI SURAT — Ganti sesuai keinginan kamu
    // =========================================
    const poemLines = `Setiap hari yang kulewati bersamamu terasa seperti halaman baru
dari cerita paling indah yang pernah kutulis.

Kamu adalah alasan aku tersenyum di waktu yang paling sederhana,
dan tempat paling hangat yang pernah kutemukan.

Terima kasih sudah menjadi kamu,
dan terima kasih sudah memilih untuk tetap di sini, bersamaku.`;

    // ===== TYPEWRITER =====
    const poemText = document.getElementById('poemText');
    const sigLine = document.getElementById('sigLine');

    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    cursor.textContent = '\u00A0';
    poemText.appendChild(cursor);

    function typeWriter() {
      if (i < poemLines.length) {
        cursor.insertAdjacentText('beforebegin', poemLines[i]);
        i++;
        setTimeout(typeWriter, 20);
      } else {
        cursor.remove();
        sigLine.classList.add('show');
      }
    }

    // mulai ngetik setelah halaman siap
    window.addEventListener('load', () => {
      setTimeout(typeWriter, 400);
    });
  </script>

</body>
</html>
